name: "Bug: CLI"
description: Report a bug with the Glubean CLI (@glubean/cli)
labels: ["bug", "cli"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command you ran and any relevant config.
      placeholder: |
        1. Run `npx @glubean/cli ...`
        2. See error
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Run `npx @glubean/cli --version`
      placeholder: e.g. 0.4.12
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: e.g. Node 20.11, Deno 1.40, Bun 1.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.3, Ubuntu 22.04, Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any error messages or logs.
      render: shell
