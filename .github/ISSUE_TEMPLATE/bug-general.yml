name: "Bug: General / Not sure"
description: Report a bug when you're not sure which component is affected
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information — screenshots, logs, versions, etc.
