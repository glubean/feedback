name: "Bug: VSCode Extension"
description: Report a bug with the Glubean VSCode extension
labels: ["bug", "vscode"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open VSCode
        2. ...
        3. See error
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: e.g. 0.12.6
  - type: input
    id: vscode-version
    attributes:
      label: VSCode version
      placeholder: e.g. 1.85.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.3, Ubuntu 22.04, Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Extension logs
      description: "Open Output panel > select 'Glubean' > paste relevant logs."
      render: shell
